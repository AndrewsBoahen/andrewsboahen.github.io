<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  mermaid.initialize({ startOnLoad: false });
  // Convert ```mermaid code blocks (rendered by Kramdown as <pre><code class="language-mermaid">)
  // into <pre class="mermaid"> blocks that Mermaid can find.
  document.querySelectorAll('pre > code.language-mermaid').forEach((codeEl) => {
    const pre = codeEl.parentElement;
    const wrapper = document.createElement('pre');
    wrapper.className = 'mermaid';
    wrapper.textContent = codeEl.textContent;
    pre.replaceWith(wrapper);
  });
  await mermaid.run();
</script>
