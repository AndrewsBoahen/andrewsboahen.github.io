<script type="module">
  import mermaid from ''https://unpkg.com/mermaid@11/dist/mermaid.esm.min.mjs';
  mermaid.initialize({ startOnLoad: false });

  // Kramdown + Rouge wraps ```mermaid blocks as:
  //   <div class="language-mermaid highlighter-rouge">
  //     <div class="highlight"><pre class="highlight"><code>...tokenized...</code></pre></div>
  //   </div>
  // We need the raw text (Rouge breaks it into <span>s), so we use textContent
  // of the <code> element, then replace the whole wrapper with a clean
  // <pre class="mermaid"> that Mermaid can find.
  document.querySelectorAll('div.language-mermaid').forEach((wrapper) => {
    const codeEl = wrapper.querySelector('code');
    if (!codeEl) return;
    const pre = document.createElement('pre');
    pre.className = 'mermaid';
    pre.textContent = codeEl.textContent;
    wrapper.replaceWith(pre);
  });

  await mermaid.run();
</script>
